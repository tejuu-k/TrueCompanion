<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TrueCompanion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .auth-container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input {
            width: 100%;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 0.5rem 1rem;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>TrueCompanion</h1>
    </header>
    <main>
        <div class="auth-container">
            <h2>Login / Register Anonymously</h2>
            <form id="authForm">
                <input type="text" id="username" placeholder="Choose a Username" required>
                <input type="password" id="password" placeholder="Choose a Password" required>
                <button type="submit" class="btn">Login/Register</button>
            </form>
            <p id="authMessage"></p>
        </div>
        <div style="text-align: center; margin-top: 2rem; padding: 1rem; background: #f9f9f9; border-radius: 4px;">
    <p>Facing issues? Contact our support team at:
    <a href="mailto:support@truecompanion.com" style="color: #4CAF50;">support@truecompanion.com</a>
    </p>
</div>

    </main>
    <footer>
        <p>© 2026 TrueCompanion. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Store in localStorage
            localStorage.setItem('username', username);
            localStorage.setItem('password', password);

            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
