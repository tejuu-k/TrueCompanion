<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | TrueCompanion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        nav a {
            color: white;
            text-decoration: none;
        }
        main {
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .profile-container {
            border: 1px solid #ddd;
            padding: 2rem;
            background: white;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>TrueCompanion</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>
    <main>
        <div class="profile-container">
            <h2>Your Profile</h2>
            <p>Username: <span id="usernameDisplay"></span></p>
            <p>Member since: <span id="memberSince"></span></p>
        </div>
    </main>
    <footer>
        <p>© 2026 TrueCompanion. All rights reserved.</p>
    </footer>

    <script>
        const username = localStorage.getItem('username');
        if (!username) {
            window.location.href = 'login.html';
        }
        document.getElementById('usernameDisplay').textContent = username;
        document.getElementById('memberSince').textContent = new Date().toLocaleDateString();
    </script>
</body>
</html>
